<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电费计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 32px 16px;
            background: #f5f7fb;
            color: #111827;
        }

        .container {
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
            padding: 20px 22px 18px;
            max-width: 520px;
            width: 100%;
            border: 1px solid #e5e7eb;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 12px;
        }

        h1 {
            color: #111827;
            font-size: 22px;
            letter-spacing: 0.02em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        h1 span.icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border-radius: 999px;
            background: #fef3c7;
            color: #f59e0b;
            font-size: 16px;
        }

        .subtitle {
            font-size: 13px;
            color: #6b7280;
            margin-top: 4px;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 999px;
            border: 1px solid #e5e7eb;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.13em;
            color: #6b7280;
            background: #f9fafb;
            white-space: nowrap;
        }

        .input-group {
            margin-bottom: 14px;
        }

        label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #374151;
            font-weight: 500;
            margin-bottom: 4px;
            font-size: 13px;
            letter-spacing: 0.01em;
        }

        label span.hint {
            font-size: 11px;
            color: #9ca3af;
        }

        .input-inner {
            display: flex;
            align-items: center;
            border-radius: 8px;
            padding: 4px 10px;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
        }

        .input-inner:focus-within {
            border-color: #6366f1;
            box-shadow: 0 0 0 1px rgba(129, 140, 248, 0.35);
            background: #ffffff;
        }

        input, select {
            flex: 1;
            border: none;
            background: transparent;
            padding: 4px 4px 4px 0;
            color: #111827;
            font-size: 14px;
            font-family: inherit;
            -moz-appearance: textfield;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input::placeholder {
            color: #9ca3af;
        }

        input:focus, select:focus {
            outline: none;
        }

        .unit {
            margin-left: 10px;
            padding-left: 10px;
            border-left: 1px solid #e5e7eb;
            font-size: 12px;
            color: #6b7280;
            min-width: 64px;
            text-align: right;
            white-space: nowrap;
        }

        .btn-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-calculate {
            width: 100%;
            padding: 9px 14px;
            background: #2563eb;
            color: #ffffff;
            border: none;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s ease-out, box-shadow 0.15s ease-out, transform 0.1s;
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.22);
        }

        .btn-calculate:hover {
            background: #1d4ed8;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.25);
            transform: translateY(-0.5px);
        }

        .btn-calculate:active {
            transform: translateY(1px);
            box-shadow: 0 4px 10px rgba(15, 23, 42, 0.2);
        }

        .btn-hint {
            font-size: 11px;
            color: #9ca3af;
        }

        .result {
            margin-top: 18px;
            padding: 12px 12px 10px;
            background: #f9fafb;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            display: none;
        }

        .result.show {
            display: block;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 13px;
        }

        .result-item:last-child {
            margin-bottom: 0;
        }

        .result-label {
            color: #6b7280;
            font-weight: 400;
        }

        .result-value {
            color: #111827;
            font-weight: 700;
        }

        .total {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed #e5e7eb;
            font-size: 14px;
        }

        .total .result-value {
            color: #16a34a;
            font-size: 18px;
        }

        .tier-info {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 6px;
            line-height: 1.4;
        }

        .footer {
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            font-size: 11px;
            color: #9ca3af;
        }

        .footer span.highlight {
            color: #2563eb;
        }

        @media (max-width: 600px) {
            .container {
                padding: 18px 14px 16px;
                border-radius: 14px;
            }

            h1 {
                font-size: 18px;
            }

            .badge {
                display: none;
            }

            .unit {
                min-width: auto;
                padding-left: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1><span class="icon">⚡</span>电费计算器</h1>
                <p class="subtitle">快速估算任意电器的真实用电成本。</p>
            </div>
            <span class="badge">实时 · 本地计算</span>
        </div>
        
        <div class="input-group">
            <label>
                <span>设备功率</span>
                <span class="hint">例如：电脑 150W、空调 900W</span>
            </label>
            <div class="input-inner">
                <input type="number" id="power" placeholder="请输入设备功率" min="0" step="1">
                <span class="unit">W</span>
            </div>
        </div>

        <div class="input-group">
            <label>
                <span>每日使用时长</span>
                <span class="hint">支持小数，例如 2.5 小时</span>
            </label>
            <div class="input-inner">
                <input type="number" id="hoursPerDay" placeholder="请输入每日使用时长" min="0" step="0.1">
                <span class="unit">小时/天</span>
            </div>
        </div>

        <div class="input-group">
            <label>
                <span>使用天数</span>
                <span class="hint">默认按 30 天计算</span>
            </label>
            <div class="input-inner">
                <input type="number" id="days" placeholder="请输入使用天数" min="0" step="1" value="30">
                <span class="unit">天</span>
            </div>
        </div>

        <div class="input-group">
            <label>
                <span>电价</span>
                <span class="hint">可改为你所在城市最新电价</span>
            </label>
            <div class="input-inner">
                <input type="number" id="pricePerKwh" placeholder="请输入电价" min="0" step="0.01" value="0.52">
                <span class="unit">元/kWh</span>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn-calculate" onclick="calculate()">计算电费</button>
            <span class="btn-hint">按 Enter 键也可以快速计算</span>
        </div>

        <div class="result" id="result">
            <div id="resultContent"></div>
        </div>

        <div class="footer">
            <span>所有数据仅在本地浏览器中计算，不会上传网络。</span>
            <span class="highlight">合理用电 · 节能省钱</span>
        </div>
    </div>

    <script>
        function calculate() {
            const power = parseFloat(document.getElementById('power').value);
            const hoursPerDay = parseFloat(document.getElementById('hoursPerDay').value);
            const days = parseFloat(document.getElementById('days').value);
            const pricePerKwh = parseFloat(document.getElementById('pricePerKwh').value);
            
            if (isNaN(power) || power < 0) {
                alert('请输入有效的设备功率！');
                return;
            }
            
            if (isNaN(hoursPerDay) || hoursPerDay < 0) {
                alert('请输入有效的每日使用时长！');
                return;
            }
            
            if (isNaN(days) || days < 0) {
                alert('请输入有效的使用天数！');
                return;
            }
            
            if (isNaN(pricePerKwh) || pricePerKwh < 0) {
                alert('请输入有效的电价！');
                return;
            }

            // 计算总用电量（千瓦时）
            const totalKwh = (power / 1000) * hoursPerDay * days;
            
            // 计算总电费
            const totalCost = totalKwh * pricePerKwh;
            
            // 计算每日电费
            const dailyCost = (power / 1000) * hoursPerDay * pricePerKwh;
            
            // 计算每小时电费
            const hourlyCost = (power / 1000) * pricePerKwh;

            const breakdown = `
                <div class="result-item">
                    <span class="result-label">设备功率：</span>
                    <span class="result-value">${power} W (${(power/1000).toFixed(2)} kW)</span>
                </div>
                <div class="result-item">
                    <span class="result-label">每日使用时长：</span>
                    <span class="result-value">${hoursPerDay.toFixed(1)} 小时</span>
                </div>
                <div class="result-item">
                    <span class="result-label">使用天数：</span>
                    <span class="result-value">${days} 天</span>
                </div>
                <div class="result-item">
                    <span class="result-label">总用电量：</span>
                    <span class="result-value">${totalKwh.toFixed(2)} kWh</span>
                </div>
                <div class="result-item">
                    <span class="result-label">每小时电费：</span>
                    <span class="result-value">¥${hourlyCost.toFixed(4)}</span>
                </div>
                <div class="result-item">
                    <span class="result-label">每日电费：</span>
                    <span class="result-value">¥${dailyCost.toFixed(2)}</span>
                </div>
                <div class="result-item total">
                    <span class="result-label">总电费（${days}天）：</span>
                    <span class="result-value">¥${totalCost.toFixed(2)}</span>
                </div>
            `;

            document.getElementById('resultContent').innerHTML = breakdown;
            document.getElementById('result').classList.add('show');
        }

        // 按回车键计算
        const inputs = ['power', 'hoursPerDay', 'days', 'pricePerKwh'];
        inputs.forEach(id => {
            document.getElementById(id).addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    calculate();
                }
            });
        });
    </script>
</body>
</html>
