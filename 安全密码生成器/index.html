<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="免费在线随机密码生成工具，可生成6位数字、12位字母数字组合及18位复杂密码，支持一键复制和重新生成">
    <meta name="keywords" content="密码生成器,随机密码,安全密码,在线工具">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>安全随机密码生成器 - 在线免费工具</title>
    <style>
        :root {
            --primary-color: #1A1A1A;
            --accent-color: #FF9900;
            --accent-hover: #E68A00;
            --background: #FAFAFA;
            --card-background: #ffffff;
            --text-primary: #222222;
            --text-secondary: #666666;
            --border-color: #E0E0E0;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.10);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.12);
            --warning-weak-bg: #FFF5E6;
            --warning-weak-border: #FFE0B2;
            --warning-weak-text: #E65100;
            --warning-normal-bg: #FFF8F0;
            --warning-normal-border: #FFD699;
            --warning-normal-text: #FF9900;
            --success-bg: #F1F8F4;
            --success-border: #C8E6C9;
            --success-text: #2E7D32;
            --radius-sm: 12px;
            --radius-md: 16px;
            --transition: all 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: var(--background);
            min-height: 100vh;
            padding: 40px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .wrapper {
            width: 100%;
            max-width: 480px;
            padding: 20px 0;
        }
        
        h1 {
            text-align: center;
            color: var(--primary-color);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 32px;
            letter-spacing: -0.5px;
        }
        
        .container {
            background: var(--card-background);
            padding: 32px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            animation: slideUp 0.25s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .btn-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }
        
        button {
            padding: 14px 20px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background: var(--card-background);
            color: var(--primary-color);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        
        button:hover {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 153, 0, 0.25);
        }

        button:active {
            transform: translateY(0);
            box-shadow: var(--shadow-sm);
        }
        
        #password-display {
            font-size: 18px;
            font-family: 'SF Mono', 'Monaco', 'Cascadia Code', 'Courier New', monospace;
            font-weight: 600;
            padding: 24px 20px;
            border: 2px dashed var(--border-color);
            border-radius: var(--radius-sm);
            text-align: center;
            margin: 24px 0;
            background: var(--background);
            word-break: break-all;
            min-height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: var(--transition);
            line-height: 1.6;
        }

        #password-display.has-password {
            border-style: solid;
            border-color: var(--accent-color);
            background: var(--card-background);
            color: var(--primary-color);
        }
        
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .action-buttons button {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
            box-shadow: 0 2px 8px rgba(255, 153, 0, 0.2);
        }

        .action-buttons button:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 153, 0, 0.3);
        }

        .action-buttons button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            pointer-events: none;
            background: var(--border-color);
            border-color: var(--border-color);
            color: var(--text-secondary);
        }

        .action-buttons button:not(:disabled) {
            pointer-events: auto;
        }

        .action-buttons button:disabled:hover {
            transform: none;
            box-shadow: 0 2px 8px rgba(255, 153, 0, 0.2);
        }
        
        .warning {
            padding: 16px 20px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            line-height: 1.6;
            border: 1px solid;
            animation: fadeIn 0.2s ease;
            display: none;
        }

        .warning.show {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .warning-weak {
            background: var(--warning-weak-bg);
            border-color: var(--warning-weak-border);
            color: var(--warning-weak-text);
        }
        
        .warning-normal {
            background: var(--warning-normal-bg);
            border-color: var(--warning-normal-border);
            color: var(--warning-normal-text);
        }

        .disclaimer {
            display: none;
            background: var(--card-background);
            padding: 28px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            margin-top: 24px;
            font-size: 14px;
            line-height: 1.7;
        }

        .disclaimer h3 {
            font-size: 18px;
            color: var(--primary-color);
            margin-bottom: 16px;
            font-weight: 700;
        }

        .disclaimer ul {
            list-style: none;
            padding-left: 0;
        }

        .disclaimer li {
            padding: 8px 0;
            padding-left: 24px;
            position: relative;
            color: var(--text-secondary);
        }

        .disclaimer li:before {
            content: "•";
            position: absolute;
            left: 8px;
            color: var(--accent-color);
            font-weight: bold;
            font-size: 16px;
        }

        .disclaimer p {
            margin-top: 16px;
            color: var(--text-secondary);
        }

        .disclaimer a {
            color: var(--accent-color);
            text-decoration: none;
            transition: var(--transition);
            font-weight: 500;
        }

        .disclaimer a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        .toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary-color);
            color: white;
            padding: 14px 28px;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 600;
            box-shadow: 0 4px 16px rgba(26, 26, 26, 0.25);
            transition: bottom 0.2s ease;
            z-index: 1000;
        }

        .toast.show {
            bottom: 40px;
        }

        @media (max-width: 400px) {
            body {
                padding: 24px 12px;
            }

            .wrapper {
                padding: 12px 0;
            }

            h1 {
                font-size: 22px;
                margin-bottom: 20px;
            }

            .container {
                padding: 24px 20px;
            }

            button {
                padding: 12px 16px;
                font-size: 13px;
            }

            #password-display {
                font-size: 16px;
                padding: 20px 16px;
            }

            .disclaimer {
                padding: 20px;
                font-size: 13px;
            }
        }

        @media (min-width: 600px) {
            .btn-group {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .wrapper {
                max-width: 560px;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <h1>🔐 安全密码生成器</h1>
        
        <div class="container">
            <div class="section-title">选择密码类型</div>
            <div class="btn-group">
                <button id="generate-6digits">6位数字</button>
                <button id="generate-12simple">12位简单</button>
                <button id="generate-12complex">12位复杂</button>
                <button id="generate-18">18位密码</button>
            </div>
            
            <div class="section-title">生成的密码</div>
            <div id="password-display">点击上方按钮生成密码</div>
            
            <div class="action-buttons">
                <button id="copy-password" disabled>📋 复制密码</button>
                <button id="regenerate" disabled>🔄 重新生成</button>
            </div>
            
            <div id="warning-message" class="warning"></div>
        </div>

        <div class="disclaimer">
            <h3>📌 免责声明</h3>
            <ul>
                <li>本工具为开源项目，代码托管于GitHub</li>
                <li>作者：小吴乐意 <a href="https://www.xiaowuleyi.com/" target="_blank">xiaowuleyi.com</a></li>
                <li>所有密码仅在浏览器本地生成，不会传输到任何服务器</li>
                <li>密码强度仅供参考，实际安全性取决于使用场景</li>
                <li>建议自行部署此工具以确保安全性</li>
                <li>作者不对使用本工具生成的密码安全性承担任何责任</li>
            </ul>
            <p>项目开源地址：<a href="https://github.com/lovexw/random-password" target="_blank">GitHub</a></p>
        </div>
    </div>

    <div id="toast" class="toast">✓ 密码已复制到剪贴板</div>
    
    <script src="script.js"></script>
</body>
</html>
